<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    overflow: hidden;
  }

  /* Subtle vignette overlay */
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.72) 100%);
    pointer-events: none;
  }

  /* Demo content so you can see it working */
  .demo-text {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.85);
    font-family: 'Georgia', serif;
    text-align: center;
    letter-spacing: 0.18em;
    pointer-events: none;
  }
  .demo-text h1 {
    font-size: clamp(2rem, 6vw, 5rem);
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.35em;
    text-shadow: 0 2px 32px rgba(0,0,0,0.6);
  }
  .demo-text p {
    margin-top: 1.2rem;
    font-size: clamp(0.8rem, 1.5vw, 1.1rem);
    letter-spacing: 0.25em;
    opacity: 0.55;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="vignette"></div>
  <!-- Remove demo-text block when using as pure background -->
  <div class="demo-text">
    <h1>Your Website</h1>
    <p>Your tagline goes here</p>
  </div>
</body>
</html>
